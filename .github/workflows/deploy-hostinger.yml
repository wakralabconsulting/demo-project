# Deploy static site to Hostinger on every push to `main` via SSH/SCP.
# Add secrets in: Repo → Settings → Secrets and variables → Actions.
# Do not commit passwords or private keys to this repository.
name: Deploy to Hostinger

on:
  push:
    branches:
      - main

concurrency:
  group: hostinger-ssh-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve SSH port and remote directory
        id: conn
        shell: bash
        run: |
          p="${{ secrets.HOSTINGER_SSH_PORT }}"
          if [ -z "$p" ]; then
            p="65002"
          fi
          t="${{ secrets.HOSTINGER_SSH_TARGET }}"
          if [ -z "$t" ]; then
            u="${{ secrets.HOSTINGER_SSH_USERNAME }}"
            t="/home/${u}/public_html"
          fi
          case "$t" in
            */) ;;
            *) t="${t}/" ;;
          esac
          echo "port=${p}" >> "$GITHUB_OUTPUT"
          echo "target=${t}" >> "$GITHUB_OUTPUT"

      - name: Upload site over SSH (SCP)
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.HOSTINGER_SSH_HOST }}
          port: ${{ steps.conn.outputs.port }}
          username: ${{ secrets.HOSTINGER_SSH_USERNAME }}
          password: ${{ secrets.HOSTINGER_SSH_PASSWORD }}
          source: "index.html,css,js"
          target: ${{ steps.conn.outputs.target }}
          strip_components: 0
          overwrite: true
