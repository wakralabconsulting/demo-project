# Deploy static site to Hostinger on every push to `main`.
# Configure FTP credentials in: Repo → Settings → Secrets and variables → Actions.
name: Deploy to Hostinger

on:
  push:
    branches:
      - main

concurrency:
  group: hostinger-ftp-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve remote directory
        id: remote
        shell: bash
        run: |
          d="${{ secrets.HOSTINGER_FTP_REMOTE_DIR }}"
          if [ -z "$d" ]; then
            d="public_html"
          fi
          case "$d" in
            */) ;;
            *) d="${d}/" ;;
          esac
          echo "path=${d}" >> "$GITHUB_OUTPUT"

      - name: Deploy files over FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.4.0
        with:
          server: ${{ secrets.HOSTINGER_FTP_HOST }}
          username: ${{ secrets.HOSTINGER_FTP_USERNAME }}
          password: ${{ secrets.HOSTINGER_FTP_PASSWORD }}
          server-dir: ${{ steps.remote.outputs.path }}
          local-dir: ./
          dangerous-clean-slate: false
          exclude: |
            **/.git*
            **/.git*/**
            .github/**
          log-level: standard
